on: push

jobs: 
    first_job: 
        runs-on: ubuntu-latest
        steps:
        - name: checkout repo
          uses: actions/checkout@v6
          
        - name: List and Read file
          run: |
            echo "My first github actions job"
            ls -lthra
            cat README.md

        - name: Generate ASCII Artwork
          run: cowsay -f dragon "Run for cover, I am a DRAGON .......RAWR" >> dragon.txt

